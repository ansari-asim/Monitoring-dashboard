<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Monitoring Tool</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="logo-text" style="margin-bottom:0.75rem">Monitoring Tool</div>
    <div class="login-title">Sign in</div>
    <div class="login-subtitle">Use your admin or user account to continue.</div>
    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Login</button>
      </div>
    </form>
    <div class="login-footer">Admin can manage config and monitor controls. User has dashboard and CSV download access only.</div>
  </div>
</body>
</html>
